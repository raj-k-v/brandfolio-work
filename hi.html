<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium Hello World experience with modern aesthetics.">
    <title>Hello World | Brandfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-gradient: linear-gradient(135deg, #ffffff 0%, #a1a1a1 100%);
            --glow-color: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .hero-section {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: clamp(3.5rem, 12vw, 9rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.06em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: revealUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            filter: drop-shadow(0 0 40px var(--glow-color));
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
        }

        .background-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes revealUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            to { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
        }

        /* Interactive Hover Effect */
        .hero-section:hover .title {
            filter: drop-shadow(0 0 60px rgba(255, 255, 255, 0.15));
            transition: filter 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    <main class="hero-section">
        <h1 class="title" id="main-greeting">Hello World</h1>
        <p class="subtitle">Premium Interface • Minimalist Design</p>
    </main>
</body>
</html>
